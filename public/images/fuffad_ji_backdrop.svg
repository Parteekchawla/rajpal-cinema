<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-back-fuffad_ji" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gold-back-fuffad_ji" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <filter id="glow-back" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-back-fuffad_ji)" />

  <!-- Premium Cinematic Overlays -->
  <rect x="30" y="30" width="1140" height="615" fill="none" stroke="url(#gold-back-fuffad_ji)" stroke-width="3" stroke-opacity="0.2" rx="20" />

  <!-- Huge elegant glowing graphic -->
  <g transform="translate(600, 300) scale(2.5)">
    <circle cx="0" cy="0" r="80" fill="#ffffff" fill-opacity="0.02" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#gold-back-fuffad_ji)" stroke-width="1" stroke-opacity="0.15" />
    <path d="M-25,-25 L25,25 M-25,25 L25,-25" stroke="url(#gold-back-fuffad_ji)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5" />
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#gold-back-fuffad_ji)" stroke-width="5" filter="url(#glow-back)" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#gold-back-fuffad_ji)" stroke-width="2" />
  </g>

  <!-- Bottom vignette fade for modern overlay contrast -->
  <rect x="0" y="400" width="1200" height="275" fill="black" fill-opacity="0.6" />

  <!-- Text elements on the left corner -->
  <g transform="translate(80, 520)">
    <!-- Movie Title -->
    <text x="0" y="0" fill="url(#gold-back-fuffad_ji)" font-family="'Outfit', 'Inter', sans-serif" font-size="54" font-weight="900" letter-spacing="1">FUFFAD JI</text>
    
    <!-- Genre & Tags -->
    <text x="0" y="45" fill="#E5E7EB" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="600">Comedy / Family / Drama  •  Punjabi  •  1h 54m  •  U/A</text>
  </g>

  <!-- Cinema Brand on top-right -->
  <text x="1120" y="80" fill="#ffffff" fill-opacity="0.3" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="800" letter-spacing="6" text-anchor="end">RAJPAL CINEMA PREMIUM</text>
</svg>