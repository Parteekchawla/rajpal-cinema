<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-honsla_rakh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="gold-honsla_rakh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bg-honsla_rakh)" rx="24" />

  <!-- Elegant Interior Border -->
  <rect x="20" y="20" width="360" height="560" fill="none" stroke="url(#gold-honsla_rakh)" stroke-width="2" stroke-opacity="0.35" rx="16" />

  <!-- Stylized Cinema Graphic in the center -->
  <g transform="translate(200, 230) scale(1.6)">
    <circle cx="0" cy="0" r="50" fill="#ffffff" fill-opacity="0.03" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#gold-honsla_rakh)" stroke-width="1.5" stroke-opacity="0.2" />
    
    <!-- Reel Projector Icons / Artistic Shapes -->
    <path d="M-15,-15 L15,15 M-15,15 L15,-15" stroke="url(#gold-honsla_rakh)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.7" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#gold-honsla_rakh)" stroke-width="4" filter="url(#glow)" />
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#gold-honsla_rakh)" stroke-width="2" />
    
    <!-- Outer accent dots -->
    <circle cx="0" cy="-38" r="3" fill="url(#gold-honsla_rakh)" />
    <circle cx="38" cy="0" r="3" fill="url(#gold-honsla_rakh)" />
    <circle cx="0" cy="38" r="3" fill="url(#gold-honsla_rakh)" />
    <circle cx="-38" cy="0" r="3" fill="url(#gold-honsla_rakh)" />
  </g>

  <!-- Movie Status Badge -->
  <rect x="40" y="40" width="125" height="30" fill="#DC2626" rx="8" />
  <text x="102.5" y="59" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="800" letter-spacing="1" text-anchor="middle">NOW SHOWING</text>

  <!-- Movie Censor Rating Badge (top right) -->
  <rect x="310" y="40" width="50" height="30" fill="#000000" fill-opacity="0.6" stroke="url(#gold-honsla_rakh)" stroke-width="1.5" rx="8" />
  <text x="335" y="59" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="800" text-anchor="middle">U/A</text>

  <!-- Film Title & Details Box at the bottom -->
  <rect x="30" y="420" width="340" height="135" fill="#030712" fill-opacity="0.75" rx="16" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  
  <text x="200" y="465" fill="url(#gold-honsla_rakh)" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="900" letter-spacing="0.5" text-anchor="middle">HONSLA RAKH</text>
  
  <text x="200" y="498" fill="#D1D5DB" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="600" text-anchor="middle">Comedy / Drama / Romance</text>
  
  <text x="200" y="525" fill="#9CA3AF" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="500" letter-spacing="0.5" text-anchor="middle">Punjabi  •  2h 38m  •  U/A</text>

  <!-- Decorative Branding at the very bottom -->
  <text x="200" y="580" fill="#ffffff" fill-opacity="0.2" font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="700" letter-spacing="5" text-anchor="middle">RAJPAL CINEMA</text>
</svg>